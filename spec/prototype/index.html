<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinly — Shop (local prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div id="header"></div>
  <div id="ticker"></div>

  <main class="wrap">
    <div class="shop-hero">
      <div class="l1">&uarr; MOVING FAST. WATCH THE TICKER. &uarr;</div>
      <div class="l2">&darr; FIXED PRICES. DEEP CUTS. &darr;</div>
    </div>

    <div class="search-row">
      <span class="sort"><svg viewBox="0 0 24 24"><polygon points="3 5 21 5 14 13 14 20 10 20 10 13"/></svg> SORT</span>
      <div class="search-box">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" fill="none" stroke="#9aa3ad" stroke-width="2"/><line x1="16" y1="16" x2="21" y2="21" stroke="#9aa3ad" stroke-width="2"/></svg>
        <input type="text" placeholder="Search wines…">
      </div>
      <button class="btn-search">SEARCH</button>
      <span class="wines-count">WINES : 53</span>
    </div>

    <section class="shop-panel">
      <div class="grid" id="shopGrid"></div>
    </section>
  </main>

  <div id="footer"></div>

  <!-- prototype-only control bar; delete before sharing screenshots if undesired -->
  <div class="proto-bar">
    <b>VINLY PROTOTYPE</b> · local copy for spec &amp; iteration · not the live site
    <span class="spacer"></span>
    <span>Shop page</span>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
